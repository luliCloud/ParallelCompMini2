syntax = "proto3";

option optimize_for = SPEED;

package mini2;

service NodeService {
  rpc Ping(PingRequest)           returns (PingResponse)          {}
  rpc Query(QueryRequest)         returns (QueryResponse)         {}
  rpc Forward(QueryRequest)       returns (QueryResponse)         {}
  rpc CountQuery(SOACountRequest) returns (SOACountResponse)      {}
  rpc GroupByQuery(SOAGroupByRequest) returns (SOAGroupByResponse) {}
  rpc TopKQuery(SOATopKRequest)   returns (SOATopKResponse)       {}
  rpc StartForwardChunks(QueryRequest) returns (ChunkSessionResponse) {} // sender: client. receiver: serverA/coordinator.return:a session_id to client. general rpc, not streaming. 
  rpc GetForwardChunk(ChunkRequest) returns (QueryChunkResponse) {} // client use session_id to pull chunk by chunk
  rpc CancelChunks(ChunkCancelRequest) returns (ChunkCancelResponse) {}
}

message PingRequest {
  string          request_id = 1;
}

message PingResponse {
  string          request_id    = 1;
  repeated string active_nodes  = 2;
}
/* request sent by client. Query, Forward, StartForwardChunks can use it
 * Which records to check, filter condition: agency, borough, etc 
 */
message QueryRequest {
  string          request_id = 1;
  optional uint32 agency_id  = 2;
  optional uint32 borough_id = 3;
  optional uint32 zip_code   = 4;
  optional float  lat_min    = 5;
  optional float  lat_max    = 6;
  optional float  lon_min    = 7;
  optional float  lon_max    = 8;
  optional uint32 chunk_size = 9; // max records by each chunk
}

message QueryResponse {
  string          request_id = 1;
  repeated Record records    = 2;
  string          from_node  = 3;
}

/* This is the return of StartForwardChunks. 
 * It is not the records. Deliver info to client: your query is ready. This is session info 
 */
message ChunkSessionResponse {
  string request_id = 1;
  string session_id = 2; // created by server. Get chunk by this
  string from_node = 3; // who create this chunk
  uint32 chunk_size = 4;
  uint32 total_chunks = 5;
  uint64 total_records = 6;
}

// Request from client to get a chunk
message ChunkRequest {
  string session_id = 1;
  uint32 chunk_index = 2;
}

// A chunk, return by GetForwardChunk
message QueryChunkResponse {
  string request_id = 1;
  string session_id = 2;
  string from_node = 3;
  uint32 chunk_index = 4;
  uint32 chunk_size = 5;
  uint32 total_chunks = 6;
  uint64 total_records = 7;
  bool done = 8;
  repeated Record records = 9;
}

message ChunkCancelRequest {
  string session_id = 1;
}

message ChunkCancelResponse {
  string session_id = 1;
  bool cancelled = 2;
}

enum SOACountKind {
  SOA_COUNT_KIND_UNSPECIFIED = 0;
  SOA_COUNT_CREATED_DATE_RANGE = 1;
  SOA_COUNT_BY_AGENCY_AND_CREATED_DATE_RANGE = 2;
  SOA_COUNT_BY_STATUS_AND_CREATED_DATE_RANGE = 3;
}

message SOACountRequest {
  string request_id = 1;
  SOACountKind kind = 2;
  int64 created_date_start = 3;
  int64 created_date_end = 4;
  int64 closed_date_start = 5;
  int64 closed_date_end = 6;
  uint32 agency_id = 7;
  uint32 status_id = 8;
  uint32 closed_status_id = 9;
}

message SOACountResponse {
  string request_id = 1;
  string from_node  = 2;
  uint64 count      = 3;
}

enum SOAGroupByKind {
  SOA_GROUP_BY_KIND_UNSPECIFIED = 0;
  SOA_GROUP_BY_BOROUGH_BY_COMPLAINT_IN_CREATED_DATE_RANGE = 1;
  SOA_GROUP_BY_BOROUGH_SUMMARY_IN_CREATED_DATE_RANGE = 2;
  SOA_GROUP_BY_AGENCY_COUNTS_IN_CREATED_DATE_RANGE = 3;
  SOA_GROUP_BY_COMPLAINT_COUNTS_IN_CREATED_DATE_RANGE = 4;
  SOA_GROUP_BY_ZIPCODE_BY_COMPLAINT_IN_CREATED_DATE_RANGE = 5;
}

message SOAGroupByRequest {
  string request_id = 1;
  SOAGroupByKind kind = 2;
  int64 created_date_start = 3;
  int64 created_date_end = 4;
  uint32 complaint_id = 5;
  uint32 borough_id = 6;
}

message SOAGroupByEntry {
  uint32 key = 1;
  uint64 count = 2;
  uint64 aux_count = 3;
}

message SOAGroupByResponse {
  string request_id = 1;
  string from_node = 2;
  repeated SOAGroupByEntry entries = 3;
}

message SOATopKRequest {
  string request_id = 1;
  int64 created_date_start = 2;
  int64 created_date_end = 3;
  uint32 top_k = 4;
}

message SOATopKEntry {
  uint32 key = 1;
  uint64 count = 2;
}

message SOATopKResponse {
  string request_id = 1;
  string from_node = 2;
  repeated SOATopKEntry entries = 3;
}

// NYC 311 dataset — matches C++ Record struct from mini 1
message Record {
  uint32 id           = 1;
  int64  created_date = 2;
  int64  closed_date  = 3;
  uint32 agency_id    = 4;
  uint32 problem_id   = 5;
  uint32 status_id    = 6;
  uint32 borough_id   = 7;
  uint32 zip_code     = 8;
  float  latitude     = 9;
  float  longitude    = 10;
}
